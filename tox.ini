[tox]
envlist = py{310,311,312,313}-{linux,macos,windows}
isolated_build = true
toxworkdir=/tmp/.tox

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313

# This section turns environment variables from github actions
# into tox environment factors. This, combined with the [gh-actions]
# section above would mean that a test running python 3.11 on ubuntu-latest
# would be converted to a tox env of `py311-linux`
[gh-actions:env]
PLATFORM =
    ubuntu-latest: linux
    ubuntu-16.04: linux
    ubuntu-18.04: linux
    ubuntu-20.04: linux
    windows-latest: windows
    macos-latest: macos
    macos-11.0: macos

# Settings defined in the top-level testenv section are automatically
# inherited by individual environments unless overridden.
[testenv]
platform =
    macos: darwin
    linux: linux
    windows: win32
# These environment variables will be passed from the calling environment
# to the tox environment
passenv =
    CI
    GITHUB_ACTIONS
setenv =
    PYTHONPATH = {toxinidir}
deps =
    pytest-cov
extras =
    test
; If you want to make tox run the tests with the same versions, create a
; requirements.txt with the pinned versions and uncomment the following line:
;     -r{toxinidir}/requirements.txt
commands =
    python -m pytest {env:PYTEST_PATH:} --basetemp={envtmpdir} --color=yes \
        --cov-report=xml --cov={env:PYTEST_PATH:plotski} \
        --ignore tools \
        {posargs}

[testenv:ruff-check]
skip_install = True
deps = pre-commit
commands = pre-commit run ruff-check --all-files

[testenv:ruff]
skip_install = True
deps = pre-commit
commands = pre-commit run ruff-check --all-files

[testenv:ruff-format]
skip_install = True
deps = pre-commit
commands = pre-commit run ruff-format --all-files
