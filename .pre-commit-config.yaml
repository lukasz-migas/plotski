-   repo: https://github.com/MarcoGorelli/absolufy-imports
    rev: v0.3.1
    hooks:
    -   id: absolufy-imports
        exclude: tests

-   repo: local
    hooks:
    -   id: ruff-check
        name: ruff-check
        entry: ruff check --fix
        language: system
        types: [python]
    -   id: ruff-format
        name: ruff-format
        entry: ruff format
        language: system
        types: [python]
